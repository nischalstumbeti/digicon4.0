<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winners - DIGICON 4.0</title>
  <link rel="stylesheet" href="prism-theme.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; width: 100%; overflow-x: hidden; display: flex; flex-direction: column; }
    .prism-body { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .header-logos {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; gap: 20px;
      border-bottom: 1px solid rgba(255, 215, 0, 0.15);
      background: linear-gradient(180deg, rgba(15, 15, 15, 0.95) 0%, rgba(10, 10, 10, 0.85) 100%);
      position: relative; z-index: 2;
      backdrop-filter: blur(12px);
    }
    .header-logos img { height: 42px; width: auto; object-fit: contain; filter: brightness(1); }
    .header-logos .header-left { display: flex; align-items: center; gap: 18px; flex: 1; }
    .header-logos .header-center { display: flex; justify-content: center; flex: 1; }
    .header-logos .header-right { flex: 1; display: flex; justify-content: flex-end; align-items: center; }
    .header-logos .euphoria-banner { height: 90px; max-width: 720px; }
    .header-logos .header-side-logo { height: 62px; width: auto; object-fit: contain; }
    .main {
      flex: 1; padding: 50px 28px 60px; max-width: 1100px; margin: 0 auto; width: 100%;
      position: relative; z-index: 1;
    }
    .hero-banner {
      text-align: center; margin-bottom: 56px; padding: 48px 32px;
      position: relative;
    }
    .hero-banner::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 280px; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.6), transparent);
    }
    .hero-banner::after {
      content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 180px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.3), transparent);
    }
    .hero-banner .digicon-logo {
      max-width: 560px; width: 100%; height: auto; margin-bottom: 16px;
      animation: float 2.5s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.5));
      display: block; margin-left: auto; margin-right: auto;
    }
    .hero-banner .sparkle { position: absolute; font-size: 1.2rem; opacity: 0.8; animation: twinkle 2s ease-in-out infinite; }
    .hero-banner .sparkle.s1 { top: 20%; left: 15%; animation-delay: 0s; }
    .hero-banner .sparkle.s2 { top: 15%; right: 18%; animation-delay: 0.5s; }
    .hero-banner .sparkle.s3 { bottom: 25%; left: 20%; animation-delay: 1s; }
    .hero-banner .sparkle.s4 { bottom: 20%; right: 15%; animation-delay: 1.5s; }
    @keyframes twinkle { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
    .main-title {
      font-family: Verdana, Geneva, sans-serif; font-size: clamp(3.2rem, 9vw, 6rem);
      font-weight: 700; letter-spacing: 16px; margin-bottom: 16px; text-align: center;
      background: linear-gradient(180deg, #fff9e6 0%, #ffd700 25%, #ffec8b 50%, #ffd700 75%, #daa520 100%);
      background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; animation: shine 3s linear infinite;
      text-shadow: 0 0 60px rgba(255, 215, 0, 0.3);
    }
    .subtitle {
      font-family: Verdana, Geneva, sans-serif; font-size: 1.4rem; font-weight: 600;
      color: #e8e8e8; margin-bottom: 10px; text-align: center; letter-spacing: 8px;
      text-transform: uppercase;
    }
    .hero-tagline {
      font-family: Verdana, Geneva, sans-serif; font-size: 1.15rem; font-style: italic;
      color: rgba(255, 215, 0, 0.8); text-align: center; letter-spacing: 2px;
    }
    @keyframes shine { to { background-position: 200% center; } }
    @keyframes float { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-12px) scale(1.02); } }
    @keyframes glow-pulse { 0%, 100% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.4), 0 0 80px rgba(255, 215, 0, 0.2); } 50% { box-shadow: 0 0 60px rgba(255, 215, 0, 0.6), 0 0 120px rgba(255, 215, 0, 0.25); } }
    @keyframes glow-silver { 0%, 100% { box-shadow: 0 0 35px rgba(192, 192, 192, 0.35); } 50% { box-shadow: 0 0 55px rgba(192, 192, 192, 0.5); } }
    @keyframes glow-bronze { 0%, 100% { box-shadow: 0 0 35px rgba(205, 127, 50, 0.35); } 50% { box-shadow: 0 0 55px rgba(205, 127, 50, 0.5); } }
    @keyframes card-reveal { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes sweep { 0% { left: -100%; } 50%, 100% { left: 100%; } }
    .winners-grid { display: flex; flex-direction: column; gap: 32px; align-items: stretch; }
    .winner-card {
      background: linear-gradient(145deg, rgba(28, 28, 28, 0.95) 0%, rgba(18, 18, 18, 0.98) 100%);
      border-radius: 20px;
      padding: 36px 48px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative; overflow: hidden;
      backdrop-filter: blur(20px);
      animation: card-reveal 0.6s ease-out forwards;
    }
    .winner-card:nth-child(1) { animation-delay: 0.1s; }
    .winner-card:nth-child(2) { animation-delay: 0.2s; }
    .winner-card:nth-child(3) { animation-delay: 0.3s; }
    .winner-card:nth-child(n+4) { animation-delay: 0.4s; }
    .winner-card::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
      animation: sweep 4s ease-in-out infinite;
    }
    .winner-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      border-radius: inherit; pointer-events: none;
      padding: 1px; background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent, rgba(255,255,255,0.05));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
    }
    .winner-card:hover { transform: translateY(-4px) scale(1.01); }
    .winner-card.place-1 {
      border: 2px solid rgba(255, 215, 0, 0.8);
      box-shadow: 0 0 50px rgba(255, 215, 0, 0.35), inset 0 0 80px rgba(255, 215, 0, 0.06);
      animation: glow-pulse 2.5s ease-in-out infinite, card-reveal 0.6s ease-out 0.1s forwards;
      padding: 48px 56px;
    }
    .winner-card.place-1 .position-badge {
      background: linear-gradient(135deg, #ffd700 0%, #ffec8b 50%, #daa520 100%);
      color: #1a1a1a; font-size: 1.2rem; padding: 12px 28px;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.4);
      font-family: Verdana, Geneva, sans-serif; font-weight: 700;
    }
    .winner-card.place-1 h3 {
      font-family: Verdana, Geneva, sans-serif; color: #ffd700; font-size: 2rem;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.5), 0 2px 4px rgba(0,0,0,0.3);
    }
    .winner-card.place-2 {
      border: 2px solid rgba(192, 192, 192, 0.8);
      box-shadow: 0 0 45px rgba(192, 192, 192, 0.3), inset 0 0 70px rgba(192, 192, 192, 0.05);
      animation: glow-silver 2.8s ease-in-out infinite, card-reveal 0.6s ease-out 0.2s forwards;
      padding: 42px 52px;
    }
    .winner-card.place-2 .position-badge {
      background: linear-gradient(135deg, #f5f5f5 0%, #c0c0c0 50%, #a8a8a8 100%);
      color: #1a1a1a; font-size: 1.1rem; padding: 11px 26px;
      box-shadow: 0 0 22px rgba(192, 192, 192, 0.6), inset 0 1px 0 rgba(255,255,255,0.5);
      font-family: Verdana, Geneva, sans-serif; font-weight: 700;
    }
    .winner-card.place-2 h3 {
      font-family: Verdana, Geneva, sans-serif; color: #e8e8e8; font-size: 1.75rem;
      text-shadow: 0 0 25px rgba(192, 192, 192, 0.5);
    }
    .winner-card.place-3 {
      border: 2px solid rgba(205, 127, 50, 0.8);
      box-shadow: 0 0 45px rgba(205, 127, 50, 0.3), inset 0 0 70px rgba(205, 127, 50, 0.05);
      animation: glow-bronze 2.8s ease-in-out infinite, card-reveal 0.6s ease-out 0.3s forwards;
      padding: 42px 52px;
    }
    .winner-card.place-3 .position-badge {
      background: linear-gradient(135deg, #daa520 0%, #cd7f32 50%, #8b4513 100%);
      color: #fff; font-size: 1.1rem; padding: 11px 26px;
      box-shadow: 0 0 22px rgba(205, 127, 50, 0.6), inset 0 1px 0 rgba(255,255,255,0.2);
      font-family: Verdana, Geneva, sans-serif; font-weight: 700;
    }
    .winner-card.place-3 h3 {
      font-family: Verdana, Geneva, sans-serif; color: #cd7f32;
      text-shadow: 0 0 25px rgba(205, 127, 50, 0.5);
    }
    .winner-card.place-other {
      border: 1px solid rgba(230, 57, 70, 0.4);
      box-shadow: 0 0 30px rgba(230, 57, 70, 0.2), inset 0 0 40px rgba(230, 57, 70, 0.03);
    }
    .winner-card.place-other .position-badge {
      background: linear-gradient(135deg, #e63946, #c1121f);
      color: #fff; font-family: Verdana, Geneva, sans-serif; font-weight: 600;
      box-shadow: 0 0 15px rgba(230, 57, 70, 0.4);
    }
    .winner-card.place-other h3 { font-family: Verdana, Geneva, sans-serif; color: #e63946; }
    .winner-card .position-badge {
      display: inline-flex; align-items: center; gap: 10px;
      border-radius: 12px; font-weight: 800; letter-spacing: 4px;
      margin-bottom: 24px;
    }
    .winner-card .position-badge .medal { font-size: 1.6em; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
    .winner-card h3 { font-size: 1.5rem; margin: 0 0 12px 0; line-height: 1.3; }
    .winner-card .team-leader {
      font-family: Verdana, Geneva, sans-serif; color: #b8b8b8;
      font-size: 1.1rem; margin-bottom: 12px; font-weight: 600;
    }
    .winner-card .problem {
      font-family: Verdana, Geneva, sans-serif; color: #e0e0e0;
      font-size: 1.05rem; margin-bottom: 8px; font-style: italic;
    }
    .winner-card .members {
      font-family: Verdana, Geneva, sans-serif; color: #7a7a7a;
      font-size: 0.95rem;
    }
    .winner-photo-wrap {
      margin: 20px auto 20px; border-radius: 16px; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      display: flex; justify-content: center;
    }
    .winner-team-photo {
      width: 100%; max-width: 320px; height: auto; max-height: 220px;
      object-fit: cover; display: block;
    }
    .winners-empty {
      text-align: center; padding: 100px 32px;
      background: linear-gradient(145deg, rgba(28, 28, 28, 0.9) 0%, rgba(18, 18, 18, 0.95) 100%);
      border: 1px solid rgba(255, 215, 0, 0.2);
      border-radius: 24px;
      backdrop-filter: blur(20px);
    }
    .winners-empty p {
      font-family: Verdana, Geneva, sans-serif; font-size: 1.4rem;
      color: rgba(255, 215, 0, 0.7); margin: 0; font-style: italic;
    }
    .site-footer { position: relative; z-index: 1; }
    @media (max-width: 768px) {
      .header-logos { gap: 12px; padding: 10px 16px; }
      .header-logos img { height: 34px; }
      .header-logos .euphoria-banner { height: 65px; max-width: 340px; }
      .header-logos .header-side-logo { height: 48px; }
      .main { padding: 40px 18px 50px; }
      .winner-card { padding: 28px 24px; }
      .winner-card.place-1, .winner-card.place-2, .winner-card.place-3 { padding: 32px 28px; }
      .hero-banner .sparkle { display: none; }
      .hero-banner .digicon-logo { max-width: 280px; }
    }
  </style>
</head>
<body class="prism-body">
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="/bg-video.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>
  <header class="header-logos">
    <div class="header-left">
      <img src="kalasalingam-logo.png" alt="Kalasalingam Academy of Research and Education" class="header-side-logo" />
      <img src="kare-acm-logo.png" alt="KARE ACM SIGBED Chapter" class="header-side-logo" />
    </div>
    <div class="header-center">
      <img src="euphoria-logo.png" alt="EUPHORIA" class="euphoria-banner" />
    </div>
    <div class="header-right">
      <img src="acm-logo.png" alt="ACM" class="header-side-logo" />
    </div>
  </header>
  <div class="main">
    <div class="hero-banner">
      <span class="sparkle s1">✦</span>
      <span class="sparkle s2">✧</span>
      <span class="sparkle s3">✦</span>
      <span class="sparkle s4">✧</span>
      <img src="digicon-winners-logo.png" alt="DIGICON 4.0" class="digicon-logo">
      <h1 class="main-title">WINNERS</h1>
      <p class="subtitle">DIGICON 4.0</p>
      <p class="hero-tagline">Congratulations to our champions!</p>
    </div>
    <div id="winnersGrid" class="winners-grid"></div>
    <div id="winnersEmpty" class="winners-empty" style="display: none;">
      <p>Winners will be announced soon. Stay tuned!</p>
    </div>
  </div>
  <footer class="site-footer">
    <div class="footer-marquee">
      <span class="footer-marquee-inner">DESIGNED AND DEVELOPED WITH ♥, KARE ACM SIGBED STUDENT CHAPTER</span>
    </div>
  </footer>
  <script>
    const posLabels = { 1: '1st', 2: '2nd', 3: '3rd' };
    const medals = { 1: '🥇', 2: '🥈', 3: '🥉' };
    function posLabel(n) { return posLabels[n] || (n + 'th'); }
    function getPlaceClass(pos) {
      const p = parseInt(pos, 10) || 1;
      if (p === 1) return 'place-1';
      if (p === 2) return 'place-2';
      if (p === 3) return 'place-3';
      return 'place-other';
    }
    function renderWinners(released, winners) {
      const grid = document.getElementById('winnersGrid');
      const empty = document.getElementById('winnersEmpty');
      if (!released || !Array.isArray(winners) || winners.length === 0) {
        if (grid) grid.style.display = 'none';
        if (empty) { empty.style.display = 'block'; empty.innerHTML = '<p>Winners will be announced soon. Stay tuned!</p>'; }
        return;
      }
      if (empty) empty.style.display = 'none';
      if (grid) {
        grid.style.display = 'flex';
        grid.innerHTML = winners.map(w => {
          const pos = parseInt(w.position, 10) || 1;
          const medal = medals[pos] ? `<span class="medal">${medals[pos]}</span>` : '';
          const photoHtml = (w.teamPhoto && typeof w.teamPhoto === 'string')
            ? `<div class="winner-photo-wrap"><img src="${escapeHtml(w.teamPhoto)}" alt="${escapeHtml(w.teamName || '')}" class="winner-team-photo"></div>`
            : '';
          return `
          <div class="winner-card ${getPlaceClass(w.position)}">
            <span class="position-badge">${medal}${posLabel(w.position || 1)} Place</span>
            <h3>${escapeHtml(w.teamName || '—')}</h3>
            <div class="team-leader">Team Leader: ${escapeHtml(w.teamLeader || '—')}</div>
            ${photoHtml}
            ${w.teamMembers ? `<div class="members">Members: ${escapeHtml(w.teamMembers.replace(/\|/g, ', '))}</div>` : ''}
            ${w.problemStatement ? `<div class="problem">Problem: ${escapeHtml(w.problemStatement)}</div>` : ''}
          </div>
        `}).join('');
      }
    }
    function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    async function loadWinners() {
      try {
        const res = await fetch('/api/winners', { cache: 'no-store' });
        const data = await res.json();
        const winners = Array.isArray(data.winners) ? data.winners : (Array.isArray(data) ? data : []);
        const released = data && data.released !== undefined ? data.released : true;
        renderWinners(released, winners);
      } catch (err) {
        document.getElementById('winnersEmpty').style.display = 'block';
        document.getElementById('winnersEmpty').innerHTML = '<p>Unable to load winners. Please try again later.</p>';
      }
    }
    loadWinners();
    const es = new EventSource('/api/events');
    es.onmessage = (e) => {
      try {
        const p = JSON.parse(e.data);
        if (p.type === 'winners' && p.data) {
          const released = p.data.released !== undefined ? p.data.released : true;
          const winners = Array.isArray(p.data.winners) ? p.data.winners : [];
          renderWinners(released, winners);
        } else if (p.type === 'winners') {
          loadWinners();
        }
      } catch (_) {}
    };
    es.onerror = () => { try { es.close(); } catch (_) {} };
  </script>
</body>
</html>
