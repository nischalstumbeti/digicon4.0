<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="stylesheet" href="prism-theme.css">
  <style>
    body {
      margin: 0;
      font-family: Verdana, Geneva, sans-serif;
      background: transparent;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .site-footer {
      padding: 16px 0;
      border-top: 1px solid rgba(230, 57, 70, 0.15);
      width: 100%;
    }
    .card {
      background: rgba(18, 18, 18, 0.9);
      border: 1px solid rgba(230, 57, 70, 0.4);
      border-radius: 8px;
      width: 100%;
      max-width: 380px;
      padding: 32px;
      box-shadow: 0 0 40px rgba(230, 57, 70, 0.1);
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 1.6rem;
      color: #e63946;
      text-align: center;
      font-family: Verdana, Geneva, sans-serif;
      letter-spacing: 4px;
    }
    p {
      margin: 0 0 20px 0;
      color: #9ca3af;
      text-align: center;
      font-size: 0.95rem;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 600;
      color: #9ca3af;
      font-size: 0.9rem;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(230, 57, 70, 0.3);
      border-radius: 4px;
      font-size: 1rem;
      background: #1a1a1a;
      color: #e8e8e8;
    }
    input:focus {
      outline: none;
      border-color: #e63946;
      box-shadow: 0 0 0 2px rgba(230, 57, 70, 0.2);
    }
    .btn {
      margin-top: 20px;
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 4px;
      background: #e63946;
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #c1121f;
      box-shadow: 0 0 20px rgba(230, 57, 70, 0.4);
    }
    .hint {
      margin-top: 16px;
      font-size: 0.85rem;
      color: #6b7280;
      text-align: center;
    }
    @media (max-width: 480px) {
      .card { margin: 16px; padding: 24px; }
    }
  </style>
</head>
<body class="prism-body">
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="/bg-video.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>
  <div class="login-wrapper">
  <div class="card">
    <h1>Admin Login</h1>
    <p>Enter your credentials to access the dashboard.</p>
    <form method="POST" action="/api/admin/login">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button class="btn" type="submit">Login</button>
    </form>
    <div class="hint">Protected area • DIGICON 4.0</div>
  </div>
  </div>
  <footer class="site-footer">
    <div class="footer-marquee">
      <span class="footer-marquee-inner">DESIGNED AND DEVELOPED WITH ♥, KARE ACM SIGBED STUDENT CHAPTER &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; DESIGNED AND DEVELOPED WITH ♥, KARE ACM SIGBED STUDENT CHAPTER</span>
    </div>
  </footer>
</body>
</html>
